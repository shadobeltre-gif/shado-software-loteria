<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SHADO SOFTWARE LOTERIA</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#1B1A17;
    --paper:#F6F1E4;
    --green:#0F3D2E;
    --green-deep:#0A2A20;
    --gold:#C9A227;
    --ball-red:#B23A2E;
    --line: rgba(27,26,23,0.12);
    --radius: 4px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family: 'Courier New', monospace;
    min-height:100vh;
  }
  .display{
    font-family: Georgia, 'Times New Roman', serif;
    font-weight:700;
    letter-spacing:0.5px;
  }

  /* ---------- LOGIN ---------- */
  #login-screen{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px;
    background:
      radial-gradient(circle at 20% 20%, rgba(201,162,39,0.08), transparent 40%),
      var(--paper);
  }
  .ticket{
    width:100%;
    max-width:360px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow: 0 1px 0 var(--line);
    position:relative;
    overflow:hidden;
  }
  .ticket::before{
    content:"";
    position:absolute;
    top:0; left:0; right:0;
    height:6px;
    background: repeating-linear-gradient(90deg, var(--green) 0 10px, transparent 10px 16px);
  }
  .ticket-head{
    padding:28px 24px 16px;
    text-align:center;
    border-bottom:1px dashed var(--line);
  }
  .ball{
    width:48px;height:48px;
    border-radius:50%;
    background:var(--ball-red);
    color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-family:Georgia, serif; font-weight:700; font-size:18px;
    margin:0 auto 12px;
    box-shadow: 0 2px 0 rgba(0,0,0,0.2) inset;
  }
  .ticket-head h1{
    font-size:20px;
    margin:0 0 4px;
    color:var(--green-deep);
  }
  .ticket-head p{
    margin:0;
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--gold);
  }
  .ticket-body{ padding:24px; }
  .field{ margin-bottom:14px; }
  .field label{
    display:block;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1px;
    margin-bottom:6px;
    color:#665;
  }
  .field input{
    width:100%;
    padding:12px 10px;
    border:1px solid var(--line);
    border-radius:2px;
    font-family:inherit;
    font-size:15px;
    background:var(--paper);
  }
  .field input:focus{
    outline:2px solid var(--green);
    outline-offset:1px;
  }
  button.primary{
    width:100%;
    padding:13px;
    background:var(--green);
    color:#fff;
    border:none;
    border-radius:2px;
    font-family: Georgia, serif;
    font-weight:700;
    font-size:15px;
    letter-spacing:0.5px;
    cursor:pointer;
    margin-top:6px;
  }
  button.primary:active{ background:var(--green-deep); }
  #login-error{
    color:var(--ball-red);
    font-size:12px;
    text-align:center;
    margin-top:10px;
    min-height:16px;
  }
  .stub-num{
    text-align:center;
    font-size:10px;
    letter-spacing:2px;
    color:#9a9484;
    padding:10px;
    border-top:1px dashed var(--line);
  }

  /* ---------- APP SHELL ---------- */
  #app-screen{ display:none; min-height:100vh; }
  header.topbar{
    background:var(--green-deep);
    color:#fff;
    padding:14px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  header.topbar .brand{
    font-family:Georgia, serif;
    font-weight:700;
    font-size:16px;
  }
  header.topbar .brand span{ color:var(--gold); }
  header.topbar button{
    background:transparent;
    border:1px solid rgba(255,255,255,0.3);
    color:#fff;
    padding:6px 12px;
    border-radius:2px;
    font-family:inherit;
    font-size:12px;
  }
  main{ padding:16px; max-width:960px; margin:0 auto; }

  .stat-row{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    margin-bottom:20px;
  }
  .stat{
    background:#fff;
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px;
  }
  .stat .num{
    font-family:Georgia, serif;
    font-size:26px;
    font-weight:700;
    color:var(--green-deep);
  }
  .stat .label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    color:#766;
    margin-top:2px;
  }

  .section-title{
    font-family:Georgia, serif;
    font-size:15px;
    font-weight:700;
    color:var(--green-deep);
    margin:24px 0 10px;
    padding-bottom:6px;
    border-bottom:1px solid var(--line);
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .section-title small{
    font-family:'Courier New', monospace;
    font-weight:400;
    font-size:11px;
    color:var(--gold);
    text-transform:uppercase;
  }

  table.tenants{
    width:100%;
    border-collapse:collapse;
    background:#fff;
    font-size:13px;
  }
  table.tenants th, table.tenants td{
    text-align:left;
    padding:10px 8px;
    border-bottom:1px solid var(--line);
  }
  table.tenants th{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    color:#766;
  }
  .badge{
    display:inline-block;
    padding:2px 8px;
    border-radius:10px;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.5px;
  }
  .badge.activo{ background:rgba(15,61,46,0.12); color:var(--green-deep); }
  .badge.gracia{ background:rgba(201,162,39,0.18); color:#8a6c12; }
  .badge.suspendido{ background:rgba(178,58,46,0.14); color:var(--ball-red); }

  .empty{
    text-align:center;
    padding:30px 16px;
    color:#888;
    font-size:13px;
    background:#fff;
    border:1px dashed var(--line);
    border-radius:var(--radius);
  }

  .config-banner{
    background:#fff3cd;
    border:1px solid #e0c468;
    color:#5c4a0f;
    padding:10px 12px;
    font-size:12px;
    border-radius:2px;
    margin-bottom:16px;
  }
  .config-banner code{ font-size:11px; }
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login-screen">
  <div class="ticket">
    <div class="ticket-head">
      <img src="icon-192.png" alt="SHADO Software" style="width:72px;height:72px;border-radius:50%;margin:0 auto 12px;display:block;">
      <h1 class="display">SHADO SOFTWARE</h1>
      <p>LOTERIA · Acceso al sistema</p>
    </div>
    <div class="ticket-body">
      <form id="login-form">
        <div class="field">
          <label for="email">Correo</label>
          <input type="email" id="email" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="password">Contraseña</label>
          <input type="password" id="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="primary">Entrar</button>
        <div id="login-error"></div>
      </form>
    </div>
    <div class="stub-num">No. 000-001 · SHADO SOFTWARE LOTERIA</div>
  </div>
  <div style="text-align:center;font-size:11px;color:#9a9484;margin-top:16px;letter-spacing:0.5px;">
    Desarrollado por Emeterio Beltre Tineo
  </div>
</div>

<!-- ============ APP (rellenado según rol) ============ -->
<div id="app-screen">
  <header class="topbar">
    <div class="brand">SHADO<span>LOTERIA</span></div>
    <button id="logout-btn">Salir</button>
  </header>
  <main id="main-content"></main>
</div>

<script>
/* =========================================================
   CONFIGURACIÓN SUPABASE
   Reemplaza estos dos valores cuando tengas el proyecto creado.
   Project Settings -> API -> Project URL / anon public key
   ========================================================= */
const SUPABASE_URL = "PEGA_AQUI_TU_PROJECT_URL";
const SUPABASE_ANON_KEY = "PEGA_AQUI_TU_ANON_KEY";

const sinConfigurar = SUPABASE_URL.startsWith("PEGA_AQUI");
let supabaseClient = null;
if(!sinConfigurar){
  supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

const loginScreen = document.getElementById('login-screen');
const appScreen = document.getElementById('app-screen');
const mainContent = document.getElementById('main-content');
const loginForm = document.getElementById('login-form');
const loginError = document.getElementById('login-error');

loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  loginError.textContent = '';

  if(sinConfigurar){
    loginError.textContent = 'Falta conectar Supabase (ver SUPABASE_URL en el código).';
    return;
  }

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
  if(error){
    loginError.textContent = 'Correo o contraseña incorrectos.';
    return;
  }

  await cargarPerfilYMostrarApp(data.user.id);
});

document.getElementById('logout-btn').addEventListener('click', async () => {
  if(supabaseClient) await supabaseClient.auth.signOut();
  appScreen.style.display = 'none';
  loginScreen.style.display = 'flex';
});

async function cargarPerfilYMostrarApp(userId){
  const { data: perfil, error } = await supabase
    .from('perfiles')
    .select('*')
    .eq('id', userId)
    .single();

  if(error || !perfil){
    loginError.textContent = 'No se encontró perfil para este usuario.';
    return;
  }

  loginScreen.style.display = 'none';
  appScreen.style.display = 'block';

  if(perfil.rol === 'super_admin'){
    renderSuperAdmin();
  } else if(perfil.rol === 'dueno'){
    renderConfiguracionDueno(perfil.tenant_id);
  } else {
    mainContent.innerHTML = '<div class="empty">App del Colector — próxima fase de construcción.</div>';
  }
}

async function renderConfiguracionDueno(tenantId){
  mainContent.innerHTML = `
    <div class="section-title">Configuración de la banca <small>Datos del negocio</small></div>
    <div class="ticket" style="max-width:480px;margin:0;">
      <div class="ticket-body">
        <div class="field" style="text-align:center;">
          <label>Logo del negocio</label>
          <img id="logo-preview" src="" alt="" style="width:96px;height:96px;border-radius:50%;object-fit:cover;border:1px solid var(--line);display:none;margin-bottom:8px;">
          <input type="file" id="logo-input" accept="image/*">
        </div>
        <div class="field">
          <label for="f-nombre">Nombre del negocio</label>
          <input type="text" id="f-nombre">
        </div>
        <div class="field">
          <label for="f-dueno">Nombre del dueño</label>
          <input type="text" id="f-dueno">
        </div>
        <div class="field">
          <label for="f-tel">Teléfono</label>
          <input type="text" id="f-tel">
        </div>
        <div class="field">
          <label for="f-email">Correo</label>
          <input type="email" id="f-email">
        </div>
        <div class="field">
          <label for="f-dir">Dirección</label>
          <input type="text" id="f-dir">
        </div>
        <button class="primary" id="guardar-config">Guardar cambios</button>
        <div id="config-msg" style="text-align:center;font-size:12px;margin-top:10px;"></div>
      </div>
      <div style="text-align:center;font-size:11px;color:#9a9484;padding:10px;border-top:1px dashed var(--line);">
        Desarrollado por Emeterio Beltre Tineo
      </div>
    </div>
  `;

  const { data: tenant, error } = await supabase
    .from('tenants')
    .select('*')
    .eq('id', tenantId)
    .single();

  if(error || !tenant){
    mainContent.innerHTML = '<div class="empty">No se pudo cargar la información de la banca.</div>';
    return;
  }

  document.getElementById('f-nombre').value = tenant.nombre_negocio || '';
  document.getElementById('f-dueno').value = tenant.dueno_nombre || '';
  document.getElementById('f-tel').value = tenant.dueno_telefono || '';
  document.getElementById('f-email').value = tenant.dueno_email || '';
  document.getElementById('f-dir').value = tenant.direccion || '';

  const logoPreview = document.getElementById('logo-preview');
  if(tenant.logo_url){
    logoPreview.src = tenant.logo_url;
    logoPreview.style.display = 'block';
  }

  let nuevoLogoFile = null;
  document.getElementById('logo-input').addEventListener('change', (e) => {
    nuevoLogoFile = e.target.files[0];
    if(nuevoLogoFile){
      logoPreview.src = URL.createObjectURL(nuevoLogoFile);
      logoPreview.style.display = 'block';
    }
  });

  document.getElementById('guardar-config').addEventListener('click', async () => {
    const msg = document.getElementById('config-msg');
    msg.textContent = 'Guardando...';
    msg.style.color = 'var(--green-deep)';

    let logo_url = tenant.logo_url;

    if(nuevoLogoFile){
      const filePath = `${tenantId}/logo-${Date.now()}-${nuevoLogoFile.name}`;
      const { error: uploadError } = await supabase
        .storage
        .from('logos')
        .upload(filePath, nuevoLogoFile, { upsert: true });

      if(uploadError){
        msg.textContent = 'Error subiendo el logo: ' + uploadError.message;
        msg.style.color = 'var(--ball-red)';
        return;
      }

      const { data: publicUrl } = supabase
        .storage
        .from('logos')
        .getPublicUrl(filePath);

      logo_url = publicUrl.publicUrl;
    }

    const { error: updateError } = await supabase
      .from('tenants')
      .update({
        nombre_negocio: document.getElementById('f-nombre').value.trim(),
        dueno_nombre: document.getElementById('f-dueno').value.trim(),
        dueno_telefono: document.getElementById('f-tel').value.trim(),
        dueno_email: document.getElementById('f-email').value.trim(),
        direccion: document.getElementById('f-dir').value.trim(),
        logo_url
      })
      .eq('id', tenantId);

    if(updateError){
      msg.textContent = 'Error guardando: ' + updateError.message;
      msg.style.color = 'var(--ball-red)';
    } else {
      msg.textContent = 'Cambios guardados correctamente.';
      msg.style.color = 'var(--green-deep)';
    }
  });
}

async function renderSuperAdmin(){
  mainContent.innerHTML = `
    <div class="stat-row">
      <div class="stat"><div class="num" id="stat-bancas">—</div><div class="label">Bancas activas</div></div>
      <div class="stat"><div class="num" id="stat-vencer">—</div><div class="label">Vencen en 7 días</div></div>
    </div>
    <div class="section-title">Bancas registradas <small>Tenants</small></div>
    <div id="tenants-wrap"><div class="empty">Cargando...</div></div>
  `;

  const { data: tenants, error } = await supabase
    .from('tenants')
    .select('id, nombre_negocio, dueno_nombre, estado, fecha_registro')
    .order('fecha_registro', { ascending: false });

  const wrap = document.getElementById('tenants-wrap');

  if(error){
    wrap.innerHTML = `<div class="empty">Error cargando bancas: ${error.message}</div>`;
    return;
  }

  if(!tenants || tenants.length === 0){
    wrap.innerHTML = '<div class="empty">Todavía no hay bancas registradas.</div>';
  } else {
    document.getElementById('stat-bancas').textContent =
      tenants.filter(t => t.estado === 'activo').length;

    wrap.innerHTML = `
      <table class="tenants">
        <thead>
          <tr><th>Banca</th><th>Dueño</th><th>Estado</th></tr>
        </thead>
        <tbody>
          ${tenants.map(t => `
            <tr>
              <td>${t.nombre_negocio}</td>
              <td>${t.dueno_nombre}</td>
              <td><span class="badge ${t.estado}">${t.estado}</span></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }
}

if(sinConfigurar){
  mainContent.innerHTML = '';
} else {
  supabaseClient.auth.getSession().then(({ data }) => {
    if(data.session){
      cargarPerfilYMostrarApp(data.session.user.id);
    }
  });
}
</script>
</body>
</html>
